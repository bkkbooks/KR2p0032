body:
  text: 行此者其有不王乎孔子曰詩亡隱志樂亡隱情文亡隱意時也文王受命矣訟頌平德也多言後其樂安而遲其歌申而易其思深而遠至矣大夏盛德也多言小夏德也多言難而怨懟者也衰矣小矣邦風其納物也博觀人俗焉大斂材焉其言文其聲善孔子曰唯能夫曰詩其猶平門與賤民而豫抒之其用心也將何如曰邦風是已民之有戚患也上下之不和者其用心也將何如是已有成功者何如曰訟頌是已清廟王德也至矣敬宗廟之禮以為其本秉文之德以為其質肅雍顯相以為其帝謂文王豫懷爾明德曷誠謂之也有命自天命此文王曷誠命之也信矣孔子曰此命也夫文王雖欲已得乎此命也十月善諀言雨無正節南山皆言上之衰也王公恥之小旻多疑疑言不中志者也小宛其言不惡少有佞焉小辨巧言則言讒人之害也伐木實咎於其也天保其得祿蔑疆矣順寡德故也祈父之刺亦有以也黃鳥則困而欲反其故也多恥者其病之乎菁菁者莪則以人益也裳裳者華則關雎之改樛木之時漢廣之智鵲巢之歸甘棠之報緑衣之思燕燕之情曷曰動而皆賢於其初者也關雎以色喻於禮兩矣其四章則喻以琴瑟之悅擬好色之願以鐘鼓之樂好反納於禮不亦能改乎樛木福斯在君子不不亦乎漢廣不求不可得不窮不可能不亦知恆乎鵲巢出以百兩不亦有離儷乎甘棠及其人敬愛其樹其報厚矣甘棠之愛以邵公情愛也關雎之改則其思益矣樛木之時則以其祿也漢廣之智則知不可得也鵲巢之歸則離儷者邵公也緑衣之憂思古人也燕燕之情以其獨也孔子曰吾以葛覃得祗敬初之詩民性固然見其美必欲反其本夫葛之見歌也則以絺綌之故也后稷之見貴也則以文武之德也吾以甘棠得宗廟之敬民性固然甚貴其人必敬其位悅其人必好其所為惡其人者亦然木瓜幣帛之不可去也民性固然其隱志必有以喻也其言有所載而後納或前之而後交人不可捍也木瓜有藏願而未得達也交杕杜如此何斯爵之矣離其所愛必曰吾奚捨之賓贈是也已孔子曰蟋蟀知戁螽斯君子北風不絶人之怨子立不東方未明有利始將仲之言不可不畏也揚之水其愛婦熺采葛之愛婦鹿鳴以樂始而會以道交見善而效終乎不厭人兔罝其用人則吾取君子陽陽小人有兔兔爰不逢時大田之卒章知言而有禮小明不忠邶柏舟悶谷風背蓼莪有孝志隰有萇楚得而謀之也惡而不閔牆有茨慎密而不知言青蠅知患不知人涉溱褰裳其絶撫而仕角枕葛生婦河水沔水知貴也將大車之囂也則以為不可如何也湛露之益也其猶馳歟孔子曰宛丘吾善之猗嗟吾喜之鳲鳩吾信之文王吾美之清廟吾敬之烈文吾悅之昊天有成命吾之宛丘曰洵有情而無望吾善之猗嗟曰四矢反以御亂吾喜之鳲鳩曰其儀一兮心如結也吾信之文王曰文王在上於昭於天吾美之清廟曰肅雍顯相濟濟多士秉文之德吾敬之烈文曰亡競維人不顯維德于呼前王不忘吾悅之昊天有成命二后受之貴且顯矣訟
